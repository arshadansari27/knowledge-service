services:
  knowledge-service:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://knowledge:knowledge@postgres:5432/knowledge
      LLM_BASE_URL: http://host.docker.internal:11434
      OXIGRAPH_DATA_DIR: /app/data/oxigraph
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - oxigraph-data:/app/data/oxigraph
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: knowledge
      POSTGRES_USER: knowledge
      POSTGRES_PASSWORD: knowledge
    ports:
      - "5433:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U knowledge"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pg-data:
  oxigraph-data:
