{% extends "base.html" %}
{% block title %}Dashboard{% endblock %}
{% block content %}
<h2 class="text-2xl font-bold mb-6">Dashboard</h2>

<!-- Stats Cards -->
<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-8"
     x-data="{ counts: null }"
     x-init="fetch('/api/admin/stats/counts').then(r => r.json()).then(d => counts = d)">
    <template x-if="counts">
        <div class="contents">
            <div class="bg-gray-800 rounded-lg p-6">
                <p class="text-gray-400 text-sm">Total Triples</p>
                <p class="text-3xl font-bold text-white mt-1" x-text="counts.triples"></p>
            </div>
            <div class="bg-gray-800 rounded-lg p-6">
                <p class="text-gray-400 text-sm">Entities</p>
                <p class="text-3xl font-bold text-white mt-1" x-text="counts.entities"></p>
            </div>
            <div class="bg-gray-800 rounded-lg p-6">
                <p class="text-gray-400 text-sm">Content Items</p>
                <p class="text-3xl font-bold text-white mt-1" x-text="counts.content"></p>
            </div>
            <div class="bg-gray-800 rounded-lg p-6">
                <p class="text-gray-400 text-sm">Ingestion Events</p>
                <p class="text-3xl font-bold text-white mt-1" x-text="counts.events"></p>
            </div>
        </div>
    </template>
    <template x-if="!counts">
        <div class="contents">
            <div class="bg-gray-800 rounded-lg p-6 animate-pulse"><div class="h-12 bg-gray-700 rounded"></div></div>
            <div class="bg-gray-800 rounded-lg p-6 animate-pulse"><div class="h-12 bg-gray-700 rounded"></div></div>
            <div class="bg-gray-800 rounded-lg p-6 animate-pulse"><div class="h-12 bg-gray-700 rounded"></div></div>
            <div class="bg-gray-800 rounded-lg p-6 animate-pulse"><div class="h-12 bg-gray-700 rounded"></div></div>
        </div>
    </template>
</div>

<!-- Confidence Distribution & Knowledge Types -->
<div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
    <div class="bg-gray-800 rounded-lg p-6"
         x-data="{ dist: null }"
         x-init="fetch('/api/admin/stats/confidence').then(r => r.json()).then(d => dist = d)">
        <h3 class="text-lg font-semibold mb-4">Confidence Distribution</h3>
        <template x-if="dist">
            <div class="space-y-3">
                <div>
                    <div class="flex justify-between text-sm mb-1"><span class="text-red-400">Low (0-0.3)</span><span x-text="dist.low"></span></div>
                    <div class="w-full bg-gray-700 rounded-full h-4"><div class="bg-red-500 h-4 rounded-full transition-all" :style="'width: ' + (dist.low / Math.max(dist.low + dist.medium + dist.high, 1) * 100) + '%'"></div></div>
                </div>
                <div>
                    <div class="flex justify-between text-sm mb-1"><span class="text-yellow-400">Medium (0.3-0.7)</span><span x-text="dist.medium"></span></div>
                    <div class="w-full bg-gray-700 rounded-full h-4"><div class="bg-yellow-500 h-4 rounded-full transition-all" :style="'width: ' + (dist.medium / Math.max(dist.low + dist.medium + dist.high, 1) * 100) + '%'"></div></div>
                </div>
                <div>
                    <div class="flex justify-between text-sm mb-1"><span class="text-green-400">High (0.7-1.0)</span><span x-text="dist.high"></span></div>
                    <div class="w-full bg-gray-700 rounded-full h-4"><div class="bg-green-500 h-4 rounded-full transition-all" :style="'width: ' + (dist.high / Math.max(dist.low + dist.medium + dist.high, 1) * 100) + '%'"></div></div>
                </div>
            </div>
        </template>
    </div>
    <div class="bg-gray-800 rounded-lg p-6"
         x-data="{ types: null }"
         x-init="fetch('/api/admin/stats/types').then(r => r.json()).then(d => types = d)">
        <h3 class="text-lg font-semibold mb-4">Knowledge Types</h3>
        <template x-if="types">
            <div class="space-y-2">
                <template x-for="(count, type) in types" :key="type">
                    <div class="flex justify-between items-center py-1">
                        <span class="text-gray-300" x-text="type"></span>
                        <span class="bg-gray-700 px-3 py-1 rounded-full text-sm" x-text="count"></span>
                    </div>
                </template>
            </div>
        </template>
    </div>
</div>

<!-- Recent Activity -->
<div class="bg-gray-800 rounded-lg p-6"
     x-data="{ events: null }"
     x-init="fetch('/api/admin/stats/activity').then(r => r.json()).then(d => events = d)">
    <h3 class="text-lg font-semibold mb-4">Recent Activity</h3>
    <template x-if="events && events.length > 0">
        <table class="w-full text-sm">
            <thead><tr class="text-gray-400 border-b border-gray-700"><th class="text-left py-2">Time</th><th class="text-left py-2">Type</th><th class="text-left py-2">Source</th><th class="text-left py-2">URL</th></tr></thead>
            <tbody>
                <template x-for="e in events" :key="e.id">
                    <tr class="border-b border-gray-700/50 hover:bg-gray-700/30">
                        <td class="py-2 text-gray-400" x-text="new Date(e.created_at).toLocaleString()"></td>
                        <td class="py-2" x-text="e.event_type"></td>
                        <td class="py-2" x-text="e.source"></td>
                        <td class="py-2"><template x-if="e.url"><a :href="'/admin/knowledge/content?url=' + encodeURIComponent(e.url)" class="text-blue-400 hover:underline truncate block max-w-xs" x-text="e.url"></a></template></td>
                    </tr>
                </template>
            </tbody>
        </table>
    </template>
    <template x-if="events && events.length === 0">
        <p class="text-gray-500">No ingestion events yet.</p>
    </template>
</div>
{% endblock %}
