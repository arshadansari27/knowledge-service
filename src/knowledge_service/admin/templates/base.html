<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin{% endblock %} — Knowledge Service</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script defer src="https://unpkg.com/alpinejs@3.14.8/dist/cdn.min.js"></script>
    <script>
        function authFetch(url, opts) {
            return fetch(url, opts).then(r => { if (r.status === 401) { window.location = '/login'; return new Response('[]'); } return r; });
        }
    </script>
    {% block head %}{% endblock %}
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex">
    <nav class="w-64 bg-gray-800 min-h-screen p-4 flex flex-col">
        <h1 class="text-xl font-bold text-white mb-8 px-2">Knowledge Service</h1>
        <ul class="space-y-1 flex-1">
            <li><a href="/admin" class="block px-3 py-2 rounded hover:bg-gray-700 {% if active == 'dashboard' %}bg-gray-700 text-white{% else %}text-gray-300{% endif %}">Dashboard</a></li>
            <li><a href="/admin/knowledge" class="block px-3 py-2 rounded hover:bg-gray-700 {% if active == 'knowledge' %}bg-gray-700 text-white{% else %}text-gray-300{% endif %}">Knowledge</a></li>
            <li><a href="/admin/chat" class="block px-3 py-2 rounded hover:bg-gray-700 {% if active == 'chat' %}bg-gray-700 text-white{% else %}text-gray-300{% endif %}">Chat</a></li>
            <li><a href="/admin/contradictions" class="block px-3 py-2 rounded hover:bg-gray-700 {% if active == 'contradictions' %}bg-gray-700 text-white{% else %}text-gray-300{% endif %}">Contradictions</a></li>
            <li><a href="/admin/jobs" class="block px-3 py-2 rounded hover:bg-gray-700 {% if active == 'jobs' %}bg-gray-700 text-white{% else %}text-gray-300{% endif %}">Jobs</a></li>
        </ul>
        <form method="POST" action="/logout" class="mt-auto">
            <button type="submit" class="w-full text-left px-3 py-2 text-gray-400 hover:text-white hover:bg-gray-700 rounded">Logout</button>
        </form>
    </nav>
    <main class="flex-1 p-8 overflow-auto">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
