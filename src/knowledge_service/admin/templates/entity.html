{% extends "base.html" %}
{% block title %}Entity: {{ label }}{% endblock %}
{% block content %}
<div class="mb-4"><a href="/admin/knowledge" class="text-blue-400 hover:underline text-sm">&larr; Back to Knowledge</a></div>
<h2 class="text-2xl font-bold mb-2">{{ label }}</h2>
<p class="text-gray-400 text-sm mb-6 break-all">{{ uri }}</p>
{% if entity_info %}
<div class="bg-gray-800 rounded-lg p-4 mb-6"><span class="text-gray-400 text-sm">Type:</span> <span class="text-gray-200">{{ entity_info.rdf_type or 'Unknown' }}</span></div>
{% endif %}
<div class="bg-gray-800 rounded-lg overflow-hidden mb-6" x-data="{ triples: null }" x-init="authFetch('/api/admin/knowledge/triples?subject={{ uri | urlencode }}&limit=100').then(r => r.json()).then(d => triples = d.items)">
    <h3 class="text-lg font-semibold p-4 border-b border-gray-700">Triples</h3>
    <table class="w-full text-sm">
        <thead><tr class="text-gray-400 border-b border-gray-700"><th class="text-left p-3">Predicate</th><th class="text-left p-3">Object</th><th class="text-left p-3">Confidence</th><th class="text-left p-3">Type</th></tr></thead>
        <tbody>
            <template x-for="(t, idx) in (triples || [])" :key="idx">
                <tr class="border-b border-gray-700/50 hover:bg-gray-700/30">
                    <td class="p-3 text-gray-300" x-text="decodeURIComponent(t.predicate.split('/').pop())"></td>
                    <td class="p-3">
                        <template x-if="t.object.startsWith('http')"><a :href="'/admin/knowledge/entity?uri=' + encodeURIComponent(t.object)" class="text-blue-400 hover:underline" x-text="decodeURIComponent(t.object.split('/').pop())"></a></template>
                        <template x-if="!t.object.startsWith('http')"><span class="text-gray-300" x-text="t.object"></span></template>
                    </td>
                    <td class="p-3"><span class="px-2 py-1 rounded text-xs" :class="t.confidence >= 0.7 ? 'bg-green-900 text-green-300' : t.confidence >= 0.3 ? 'bg-yellow-900 text-yellow-300' : 'bg-red-900 text-red-300'" x-text="t.confidence.toFixed(2)"></span></td>
                    <td class="p-3 text-gray-400" x-text="t.knowledge_type"></td>
                </tr>
            </template>
        </tbody>
    </table>
</div>
{% endblock %}
